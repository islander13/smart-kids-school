  <body>
    <!-- ════════════════════════════════════════════════════════════════════
         NETLIFY FORMS DETECTION — formulaires cachés
         ════════════════════════════════════════════════════════════════════
         Ces formulaires invisibles sont scannés par Netlify lors du build pour
         activer la détection automatique. NE PAS LES SUPPRIMER.
         Honeypot field (bot-field) = anti-spam basique.
    -->

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
    </form>

    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="source" />
    </form>

    <form name="plan-enrollment" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="plan" />
      <input type="text" name="planKey" />
      <input type="text" name="planPrice" />
      <input type="text" name="parentName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="numChildren" />
      <input type="text" name="child1Name" />
      <input type="number" name="child1Age" />
      <input type="text" name="child2Name" />
      <input type="number" name="child2Age" />
      <textarea name="message"></textarea>
    </form>

    <form name="stage-enrollment" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="period" />
      <input type="text" name="parentName" />
      <input type="text" name="childName" />
      <input type="number" name="childAge" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="preferredSession" />
      <textarea name="message"></textarea>
    </form>

    <form name="premium-enrollment" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="plan" />
      <input type="text" name="parentName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="childName" />
      <input type="number" name="childAge" />
      <textarea name="objectives"></textarea>
      <input type="text" name="bestTime" />
    </form>

    <!-- Soumis uniquement par le webhook Stripe (netlify/functions/stripe-webhook.js),
         jamais par un visiteur : confirmation qu'un paiement a réellement abouti,
         même si le client ferme son onglet avant d'atteindre /merci. -->
    <form name="payment-confirmed" data-netlify="true" hidden>
      <input type="text" name="sessionId" />
      <input type="email" name="email" />
      <input type="text" name="amount" />
      <input type="text" name="productKey" />
      <input type="text" name="parentName" />
      <input type="tel" name="phone" />
    </form>

    <!-- Soumis uniquement par la fonction planifiée (netlify/functions/scheduled-digest.js),
         une fois par jour : récapitulatif des formulaires remplis sans paiement confirmé. -->
    <form name="abandoned-digest" data-netlify="true" hidden>
      <input type="text" name="count" />
      <textarea name="summary"></textarea>
    </form>

    <!-- ════════════════════════════════════════════════════════════════════ -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
